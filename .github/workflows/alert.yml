name: 부산 뉴스속보 (2분 폴링)

on:
  schedule:
    - cron: "*/15 * * * *"   # 보험용 기상 시도 (크론이 작동하게 되면 자동 재점화 역할)
  workflow_dispatch: {}

concurrency:
  group: alert
  cancel-in-progress: false

permissions:
  contents: write            # state.json 커밋용
  actions: write             # 자가 연쇄(다음 루프) + 밤10시 보고 트리거용

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 의존성 설치
        run: npm ci --no-audit --no-fund
      - name: 2분 간격 폴링 (58분간)
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_ORD_TOKEN: ${{ secrets.TG_ORD_TOKEN }}
          TG_BILL_TOKEN: ${{ secrets.TG_BILL_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          POLL_INTERVAL_SEC: "120"
          POLL_DURATION_MIN: "58"
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: node alert.mjs
      - name: 상태 저장(커밋)
        if: always()
        run: |
          git config user.name "busan-alert-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase -X ours || true
          git add state.json archive/ 2>/dev/null || git add state.json
          git diff --cached --quiet || git commit -m "state update [skip ci]"
          git push || true
      - name: 다음 루프 자가 연쇄 (크론 불신 대비)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run alert.yml -R ${{ github.repository }} || true

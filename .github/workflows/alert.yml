name: 부산 뉴스속보 (2분 폴링)

on:
  schedule:
    # 15분마다 기상 시도 — GitHub 크론은 자주 미발화되므로 여러 번 시도해 하나만 걸려도
    # concurrency 대기열을 통해 직전 58분 루프가 끝나는 즉시 다음 루프가 이어짐
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: alert
  cancel-in-progress: false

permissions:
  contents: write            # state.json 커밋용

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 2분 간격 폴링 (58분간)
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          POLL_INTERVAL_SEC: "120"
          POLL_DURATION_MIN: "58"
        run: node alert.mjs
      - name: 상태 저장(커밋)
        if: always()
        run: |
          git config user.name "busan-alert-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase -X ours || true
          git add state.json
          git diff --cached --quiet || git commit -m "state update [skip ci]"
          git push || true
